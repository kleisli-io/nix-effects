allocTolerancePermille = 5

# Absolute floor (allocation units) for the joint hard-fail rule: a counter
# fails only if it moves BOTH > allocTolerancePermille (relative) AND
# >= allocAbsoluteFloor (absolute). Stops a tiny-base counter from setting the
# verdict on a noise-grade absolute move (a base-3425 counter rising ~1.6k
# reads as +486‰ but is ~0.04% of the workload's total allocation). Only bites
# counters with base < allocAbsoluteFloor / (allocTolerancePermille/1000)
# ≈ 400k; million-scale counters are unaffected. Per-counter blame still
# reports every mover regardless of this floor.
allocAbsoluteFloor = 2000

# Generous tolerance (‰) for the relocation-invariant heap-bytes aggregate
# (Σ of values/envs/sets/list .bytes, excluding symbolsBytes). A faithful
# representation change relocates per-category counts but shifts total heap
# bytes only a few % (observed: a desc-ind rep change nets +45‰ while a
# per-counter view reads ±hundreds of ‰). 50‰ = 5% lets that pass while an
# across-the-board real regression still fails. The tight memory signal is
# peak-heap; this axis gates net throughput, not relocation noise.
allocBytesAggregateTolerancePermille = 50

# Soft-warn threshold (%) for the peak-heap (gc.heapSize p50) delta. Peak heap
# is the true space signal but GC-timing-nondeterministic, so it warns and
# never hard-gates.
peakHeapWarnPct = 25

